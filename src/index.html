<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Build Tool Showcase</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header>
      <div class="header-content">
        <div class="logo">
          <i class="" id="logo"></i>
          <h1 class="heading">Build Tools</h1>
        </div>
        <div class="header-actions">
          <input
            type="text"
            id="search-bar"
            placeholder="Search tools..."
            class="search-bar"
          />
          <div class="filters">
            <button class="btn" id="filter-all">All</button>
            <button class="btn" id="filter-active">Active</button>
            <button class="btn" id="filter-inactive">Inactive</button>
          </div>
          <button id="themeToggle" class="theme-toggle">
            <i id="themeIcon" class="fas fa-moon"></i>
          </button>
        </div>
      </div>
    </header>
    <main class="wrapper">
      <section class="main-section">
        <div class="cards-container" id="extensions-list"></div>
      </section>
    </main>
    <footer>
      <p>© 2025 Emanndev. All rights reserved</p>
    </footer>
  </body>
</html>
